<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Load font before anything is rendered -->
    <link rel="preload"
          href="./fonts/SUSE-Variable.ttf"
          as="font" type="font/ttf" crossorigin/>

    <!-- Critical CSS for zero-flash loading -->
    <style>
      /* Declare the font early so the browser can use it right from the first composite pass */
      @font-face {
        font-family: "SUSE";
        src: url("./fonts/SUSE-Variable.ttf") format("truetype");
        font-weight: 100 900;
        font-display: swap;
      }

      /* Let theme system set background to prevent flash */
      html,body{margin:0;height:100%;width:100%;background:transparent;color:#cccccc}
    </style>
  <script type="text/javascript" defer crossorigin src="./assets/main-Bumuo9MN.js"></script>
</head>

<body>
    <script src="./polyfills.js"></script>
    <script src="./CSInterface.js" type="text/javascript"></script>
</body>

</html>
